name: Publicar construtor no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototipo/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: prototipo

      - name: Construir aplicativo
        run: npm run build
        working-directory: prototipo

      - name: Preparar fallback SPA
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
        working-directory: prototipo

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototipo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
